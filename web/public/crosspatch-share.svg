<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CrossPatch failure-first incident repair</title>
  <desc id="desc">A Tracepaper graphic showing evidence, challenge, human approval, and verified repair.</desc>
  <rect width="1200" height="630" fill="#f3f1ea"/>
  <rect x="0" y="0" width="252" height="630" fill="#1b1915"/>
  <image data-crosspatch-mark="operator-latest1-v1" x="40" y="42" width="76" height="76" href="crosspatch-mark.png"/>
  <text x="40" y="160" fill="#f7f3e8" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">CROSSPATCH</text>
  <text x="40" y="186" fill="#c4bdae" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2">FAILURE-FIRST SRE</text>
  <line x1="40" y1="220" x2="212" y2="220" stroke="#403b33"/>
  <text x="40" y="268" fill="#958d80" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="2">CONTROL BOUNDARY</text>
  <circle cx="49" cy="306" r="5" fill="#006a52"/>
  <text x="66" y="311" fill="#f7f3e8" font-family="Arial, Helvetica, sans-serif" font-size="15">Sanitized evidence</text>
  <circle cx="49" cy="342" r="5" fill="#7f4f00"/>
  <text x="66" y="347" fill="#f7f3e8" font-family="Arial, Helvetica, sans-serif" font-size="15">Human approval</text>
  <circle cx="49" cy="378" r="5" fill="#006a52"/>
  <text x="66" y="383" fill="#f7f3e8" font-family="Arial, Helvetica, sans-serif" font-size="15">Trusted verification</text>
  <rect x="40" y="515" width="172" height="72" fill="none" stroke="#403b33"/>
  <text x="58" y="543" fill="#958d80" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5">RECORDED PROOF</text>
  <text x="58" y="570" fill="#f7f3e8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="800">FAIL CLOSED</text>

  <text x="310" y="72" fill="#625b50" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="2.3">INCIDENT EVIDENCE → VERIFIABLE REPAIR</text>
  <text x="310" y="154" fill="#16130e" font-family="Arial, Helvetica, sans-serif" font-size="61" font-weight="800" letter-spacing="-2">Repair the failure.</text>
  <text x="310" y="218" fill="#16130e" font-family="Arial, Helvetica, sans-serif" font-size="61" font-weight="800" letter-spacing="-2">Prove the outcome.</text>
  <rect x="310" y="252" width="830" height="2" fill="#352f26"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="310" y="304" width="184" height="142" fill="#fbfaf5" stroke="#352f26"/>
    <rect x="310" y="304" width="184" height="13" fill="#a82038"/>
    <text x="330" y="352" fill="#625b50" font-size="12" font-weight="700" letter-spacing="1.5">01 / EVIDENCE</text>
    <text x="330" y="390" fill="#16130e" font-size="23" font-weight="800">Failure</text>
    <text x="330" y="418" fill="#16130e" font-size="23" font-weight="800">reproduced</text>

    <rect x="515" y="304" width="184" height="142" fill="#fbfaf5" stroke="#352f26"/>
    <rect x="515" y="304" width="184" height="13" fill="#1f55a8"/>
    <text x="535" y="352" fill="#625b50" font-size="12" font-weight="700" letter-spacing="1.5">02 / CHALLENGE</text>
    <text x="535" y="390" fill="#16130e" font-size="23" font-weight="800">Rivals</text>
    <text x="535" y="418" fill="#16130e" font-size="23" font-weight="800">tested</text>

    <rect x="720" y="304" width="184" height="142" fill="#fbfaf5" stroke="#352f26"/>
    <rect x="720" y="304" width="184" height="13" fill="#7f4f00"/>
    <text x="740" y="352" fill="#625b50" font-size="12" font-weight="700" letter-spacing="1.5">03 / APPROVAL</text>
    <text x="740" y="390" fill="#16130e" font-size="23" font-weight="800">Human</text>
    <text x="740" y="418" fill="#16130e" font-size="23" font-weight="800">gate held</text>

    <rect x="925" y="304" width="215" height="142" fill="#b8dc32" stroke="#352f26"/>
    <text x="945" y="352" fill="#16130e" font-size="12" font-weight="700" letter-spacing="1.5">04 / VERIFIED</text>
    <text x="945" y="390" fill="#16130e" font-size="23" font-weight="800">Trusted proof</text>
    <text x="945" y="418" fill="#16130e" font-size="23" font-weight="800">retained</text>
  </g>

  <line x1="310" y1="500" x2="1140" y2="500" stroke="#c8c1b2"/>
  <text x="310" y="546" fill="#16130e" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">Five exact GPT-5.6 seats. One explicit human gate.</text>
  <text x="310" y="579" fill="#625b50" font-family="Arial, Helvetica, sans-serif" font-size="17">Sanitized projections in · Hash-bound warrant out · Sandbox execution only</text>
  <rect x="1098" y="548" width="42" height="42" fill="#b8dc32"/>
  <path d="M1110 569h18m-7-7 7 7-7 7" fill="none" stroke="#16130e" stroke-width="3"/>
</svg>
